<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="../../dist/output.css">
    

</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200">
    <header class="flex place-content-between place-items-center px-6 py-3 bg-white gap-5 dark:bg-gray-800 shadow-md">
        <div class="text-xl font-bold text-blue-400 dark:text-gray-200">Student Dashboard</div>
        <div class="border-2 border-solid rounded-2xl px-3 py-1 "><input class="bg-transparent border-none focus:outline-none" type="text" placeholder="search bar"></div>
        <div class="hidden md:flex  gap-3 ">
        
        
            <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
            </svg>

            <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                 <path stroke-linecap="round" stroke-linejoin="round" d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
            </svg>
        </div>
           
    </header>
    <div class="flex">

    
        <aside class="hidden md:flex flex-col w-64 bg-gray-100 dark:bg-gray-800 p-4 space-y-4 h-screen">
          <a href="">Dashboard</a>
          <a href="">Subjects</a>
          <a href="">Assignments</a>
         <a href="">Profile</a>
       </aside>

       <main class="p-4">
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
              <div class="p-4 bg-white dark:bg-gray-800 shadow-lg rounded-lg hover:shadow-xl transition">
                 <div class="text-sm font-semibold text-gray-500 dark:text-gray-400">Subjects</div>
                 <div class="mt-2 text-2xl font-bold text-gray-500 dark:text-gray-200 ">5</div>
              </div>
              <div class="p-4 bg-white dark:bg-gray-800 shadow-lg rounded-lg hover:shadow-xl transition">
                 <div class="text-sm font-semibold text-gray-500 dark:text-gray-400">Assignments</div>
                 <div class="mt-2 text-2xl font-bold text-gray-500 dark:text-gray-200 ">12</div>
              </div>
              <div class="p-4 bg-white dark:bg-gray-800 shadow-lg rounded-lg hover:shadow-xl transition">
                 <div class="text-sm font-semibold text-gray-500 dark:text-gray-400">Attendance</div>
                 <div class="mt-2 text-2xl font-bold text-gray-500 dark:text-gray-200 ">88%</div>
              </div>
              <div class="p-4 bg-white dark:bg-gray-800 shadow-lg rounded-lg hover:shadow-xl transition">
                 <div class="text-sm font-semibold text-gray-500 dark:text-gray-400">Study Hours</div>
                 <div class="mt-2 text-2xl font-bold text-gray-500 dark:text-gray-200 ">42</div>
              </div>
          </div>
        </main>
    </div>
</body>
</html>
